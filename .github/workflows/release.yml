name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact: mirroid-windows-amd64.exe
            output: Mirroid.exe
          - os: ubuntu-latest
            target: linux
            artifact: mirroid-linux-amd64.tar.xz
            output: Mirroid.tar.xz
          - os: macos-latest
            target: darwin
            artifact: mirroid-macos-arm64.zip
            output: Mirroid.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Package
        run: fyne package --target ${{ matrix.target }} --release

      - name: Rename artifact (Windows)
        if: matrix.target == 'windows'
        run: mv "${{ matrix.output }}" "${{ matrix.artifact }}"

      - name: Rename artifact (Linux)
        if: matrix.target == 'linux'
        run: mv "${{ matrix.output }}" "${{ matrix.artifact }}"

      - name: Zip app bundle (macOS)
        if: matrix.target == 'darwin'
        run: zip -r "${{ matrix.artifact }}" "${{ matrix.output }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Sign artifacts
        run: |
          for file in artifacts/*; do
            gpg --batch --yes --detach-sign --armor "$file"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
